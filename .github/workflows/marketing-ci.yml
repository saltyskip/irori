name: Marketing CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'marketing/**'
      - '.github/workflows/marketing-ci.yml'
  push:
    branches: [main]
    paths:
      - 'marketing/**'
      - '.github/workflows/marketing-ci.yml'

jobs:
  lint:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'marketing/package-lock.json'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
